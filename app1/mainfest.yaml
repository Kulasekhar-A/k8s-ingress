apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-1
  labels:
    project: roboshop
    tier: frontend
    component: app-1
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      tier: frontend
      component: app-1
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        component: app-1
    spec:
      containers:
      - name: app-1
        image: annurukulasekhar/app1:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: app-1
spec:
  selector:
    #labels used as selectors
    project: roboshop
    tier: frontend
    component: app-1
  ports:
  - protocol: TCP
    port: 80 # servie port
    targetPort: 80 # container port
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-1
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: 'arn:aws:acm:us-east-1:051674313773:certificate/a040ecc2-3efd-4587-8b82-205127a98f47'
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/tags: Environment=dev,Project=roboshop
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
  - host: "app1.annuru.online"
    http:
      paths:
      - pathType: Prefix
        path: "/r"
        backend:
          service:
            name: app-1
            port:
              number: 80
  